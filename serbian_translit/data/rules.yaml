# Serbian/Montenegrin script conversion rules.
#
# Each rule declares a source‚Üítarget script and gives three ordered maps:
#   digraphs: matched first, greedy (`lj`‚Üí`—ô`, `dŇĺ`‚Üí`—ü`); case-aware.
#   pre_char: pre-processed single-character remaps applied before `singles`.
#                Used for accepting alternate codepoints (ńź variants) that
#                collapse to the same base letter.
#   singles:  1:1 base-letter map.
# Case handling: the engine looks at the surrounding word to decide
# LOWER / UPPER / TITLE, so `Nj` in "Njujork" but `NJ` in "NJUJORK".
#
# extras_in_word: letters (beyond base ASCII / Cyrillic ranges) that count
# as part of a word for tokenisation. Without listing them, `Ň°` or `Ňĺ` would
# split a Latin word into pieces and case-detection would misfire.
#
# non_native_letters: if a word contains any of these letters, it is left
# untouched (foreign inclusion). Applies to Latin source only.

rules:

  - source: srp-latn
    target: srp-cyrl
    digraphs:
      lj: —ô
      nj: —ö
      dŇĺ: —ü
    pre_char:
      "√ź": "ńź"   # √ź (Eth) ‚Üí ńź (D-stroke): editors often type Eth by accident
      "√į": "ńĎ"   # √į (eth) ‚Üí ńĎ (d-stroke): same
    singles:
      a: –į
      b: –Ī
      c: —Ü
      "ńć": —á
      "ńá": —õ
      d: –ī
      "ńĎ": —í
      e: –Ķ
      f: —Ą
      g: –≥
      h: —Ö
      i: –ł
      j: —ė
      k: –ļ
      l: –Ľ
      m: –ľ
      n: –Ĺ
      o: –ĺ
      p: –Ņ
      r: —Ä
      s: —Ā
      "Ň°": —ą
      t: —ā
      u: —É
      v: –≤
      z: –∑
      "Ňĺ": –∂
    extras_in_word: "ńćńĆńáńÜńĎńźŇ°Ň†ŇĺŇĹ"
    non_native_letters: "wxyqWXYQ"
    # Words that look like Roman numerals but are Serbian
    # pronouns/particles, compared case-insensitively.
    never_roman: ["MI", "LI", "VI", "CI"]

  - source: srp-cyrl
    target: srp-latn
    digraphs:
      "—ô": lj
      "—ö": nj
      "—ü": dŇĺ
    singles:
      "–į": a
      "–Ī": b
      "–≤": v
      "–≥": g
      "–ī": d
      "—í": "ńĎ"
      "–Ķ": e
      "–∂": "Ňĺ"
      "–∑": z
      "–ł": i
      "—ė": j
      "–ļ": k
      "–Ľ": l
      "–ľ": m
      "–Ĺ": n
      "–ĺ": o
      "–Ņ": p
      "—Ä": r
      "—Ā": s
      "—ā": t
      "—õ": "ńá"
      "—É": u
      "—Ą": f
      "—Ö": h
      "—Ü": c
      "—á": "ńć"
      "—ą": "Ň°"
    extras_in_word: ""
    non_native_letters: ""

  - source: cnr-latn
    target: cnr-cyrl
    digraphs:
      lj: —ô
      nj: —ö
      dŇĺ: —ü
    pre_char:
      "√ź": "ńź"
      "√į": "ńĎ"
    singles:
      a: –į
      b: –Ī
      c: —Ü
      "ńć": —á
      "ńá": —õ
      d: –ī
      "ńĎ": —í
      e: –Ķ
      f: —Ą
      g: –≥
      h: —Ö
      i: –ł
      j: —ė
      k: –ļ
      l: –Ľ
      m: –ľ
      n: –Ĺ
      o: –ĺ
      p: –Ņ
      r: —Ä
      s: —Ā
      "Ňõ": "—ĀŐĀ"
      "Ň°": —ą
      t: —ā
      u: —É
      v: –≤
      z: –∑
      "Ňļ": "–∑ŐĀ"
      "Ňĺ": –∂
    extras_in_word: "ńćńĆńáńÜńĎńźŇ°Ň†ŇĺŇĹŇõŇöŇļŇĻ"
    non_native_letters: "wxyqWXYQ"
    # Words that look like Roman numerals but are Montenegrin
    # pronouns/particles, compared case-insensitively.
    never_roman: ["MI", "LI", "VI", "CI"]

  - source: cnr-cyrl
    target: cnr-latn
    digraphs:
      "—ô": lj
      "—ö": nj
      "—ü": dŇĺ
      # —ĀŐĀ / –∑ŐĀ are two codepoints (base + U+0301). Handled as digraphs so the
      # combining mark is consumed with its base letter and does not leak.
      "—ĀŐĀ": "Ňõ"
      "–∑ŐĀ": "Ňļ"
    singles:
      "–į": a
      "–Ī": b
      "–≤": v
      "–≥": g
      "–ī": d
      "—í": "ńĎ"
      "–Ķ": e
      "–∂": "Ňĺ"
      "–∑": z
      "–ł": i
      "—ė": j
      "–ļ": k
      "–Ľ": l
      "–ľ": m
      "–Ĺ": n
      "–ĺ": o
      "–Ņ": p
      "—Ä": r
      "—Ā": s
      "—ā": t
      "—õ": "ńá"
      "—É": u
      "—Ą": f
      "—Ö": h
      "—Ü": c
      "—á": "ńć"
      "—ą": "Ň°"
    extras_in_word: "ŐĀ"
    non_native_letters: ""
