# Test cases shared across every port (Python / Swift / Kotlin).
# Each section pins a source→target direction; the same YAML drives the
# pytest parametrize in every language.

tests:

  - section: "Serbian Latin → Cyrillic — mixed-case digraphs (irregular)"
    lang: srp
    direction: to_cyr
    cases:
      - text: "lJ"
        want: "љ"
      - text: "nJ"
        want: "њ"
      - text: "dŽ"
        want: "џ"

  - section: "Serbian Latin → Cyrillic — common words"
    lang: srp
    direction: to_cyr
    cases:
      - text: "Srbija"
        want: "Србија"
      - text: "SRBIJA"
        want: "СРБИЈА"
      - text: "Beograd"
        want: "Београд"
      - text: "BEOGRAD"
        want: "БЕОГРАД"
      - text: "Novi Sad"
        want: "Нови Сад"
      - text: "NOVI SAD"
        want: "НОВИ САД"

  - section: "Serbian Latin → Cyrillic — digraph words"
    lang: srp
    direction: to_cyr
    cases:
      - text: "ljubav"
        want: "љубав"
      - text: "Ljubav"
        want: "Љубав"
      - text: "LJUBAV"
        want: "ЉУБАВ"
      - text: "konj"
        want: "коњ"
      - text: "Konj"
        want: "Коњ"
      - text: "KONJ"
        want: "КОЊ"
      - text: "džep"
        want: "џеп"
      - text: "Džep"
        want: "Џеп"
      - text: "DŽEP"
        want: "ЏЕП"

  - section: "Serbian Latin → Cyrillic — diacritics"
    lang: srp
    direction: to_cyr
    cases:
      - text: "čovek"
        want: "човек"
      - text: "Čovek"
        want: "Човек"
      - text: "ČOVEK"
        want: "ЧОВЕК"
      - text: "ćao"
        want: "ћао"
      - text: "Ćao"
        want: "Ћао"
      - text: "ĆAO"
        want: "ЋАО"
      - text: "đak"
        want: "ђак"
      - text: "Đak"
        want: "Ђак"
      - text: "ĐAK"
        want: "ЂАК"
      - text: "što"
        want: "што"
      - text: "Što"
        want: "Што"
      - text: "ŠTO"
        want: "ШТО"
      - text: "žena"
        want: "жена"
      - text: "Žena"
        want: "Жена"
      - text: "ŽENA"
        want: "ЖЕНА"

  - section: "Serbian Latin → Cyrillic — sentences"
    lang: srp
    direction: to_cyr
    cases:
      - text: "Dobar dan"
        want: "Добар дан"
      - text: "DOBAR DAN"
        want: "ДОБАР ДАН"
      - text: "Kako si?"
        want: "Како си?"
      - text: "Hvala lepo"
        want: "Хвала лепо"
      - text: "Vidimo se kasnije"
        want: "Видимо се касније"

  - section: "Serbian Latin → Cyrillic — consecutive digraphs"
    lang: srp
    direction: to_cyr
    cases:
      - text: "Njujork"
        want: "Њујорк"
      - text: "NJUJORK"
        want: "ЊУЈОРК"

  - section: "Serbian Latin → Cyrillic — numbers and punctuation"
    lang: srp
    direction: to_cyr
    cases:
      - text: "Beograd 2024"
        want: "Београд 2024"
      - text: "Zdravo, kako si?"
        want: "Здраво, како си?"

  - section: "Serbian Latin → Cyrillic — mixed Serbian and non-Serbian"
    lang: srp
    direction: to_cyr
    cases:
      - text: "Srbija i Serbia"
        want: "Србија и Сербиа"
      - text: "café u Beogradu"
        want: "цафé у Београду"

  - section: "Serbian Latin → Cyrillic — Roman numerals stay Latin"
    lang: srp
    direction: to_cyr
    cases:
      - text: "Nikolaj II"
        want: "Николај II"
      - text: "Aleksandar III"
        want: "Александар III"
      - text: "Luj XIV"
        want: "Луј XIV"
      - text: "XX vek"
        want: "XX век"

  - section: "Serbian Latin → Cyrillic — digit-first words still transliterate (M2)"
    lang: srp
    direction: to_cyr
    cases:
      # A word starting with a digit still contains transliteratable
      # letters — do not skip it whole.
      - text: "2brzo za nas"
        want: "2брзо за нас"
      - text: "100dinara"
        want: "100динара"
      - text: "20god od"
        want: "20год од"

  - section: "Serbian Latin → Cyrillic — MIXED-case brand names left untouched (M1)"
    lang: srp
    direction: to_cyr
    cases:
      # Real brand and biology terms — a MIXED-case word cannot be
      # confidently mapped to a single script and gets left as-is.
      - text: "kupio je iPhone"
        want: "купио је iPhone"
      - text: "novi YouTube kanal"
        want: "нови YouTube канал"
      - text: "iOS uređaj"
        want: "iOS уређај"
      - text: "mRNA vakcina"
        want: "mRNA вакцина"
      # The mixed-case irregular digraphs from the existing test are NOT
      # brand names — the entire word is a Serbian phrase written weirdly.
      # Those remain in their own section (edge_cases).

  - section: "Serbian Latin → Cyrillic — URLs/emails/handles preserved (B3)"
    lang: srp
    direction: to_cyr
    cases:
      # URLs — nothing inside a URL should transliterate.
      - text: "poseti https://beograd.rs sada"
        want: "посети https://beograd.rs сада"
      - text: "www.beograd.rs je tu"
        want: "www.beograd.rs је ту"
      - text: "http://kod.hr link"
        want: "http://kod.hr линк"
      # Email addresses — user@host untouched, surrounding text converts.
      - text: "info@beograd.rs sada"
        want: "info@beograd.rs сада"
      # Hashtags — leading #, rest untouched.
      - text: "vidi #Beograd i #NoviSad ovde"
        want: "види #Beograd и #NoviSad овде"
      # Mentions — leading @, rest untouched.
      - text: "prati @novisad danas"
        want: "прати @novisad данас"

  - section: "Serbian Latin → Cyrillic — Roman false-positives (B2)"
    lang: srp
    direction: to_cyr
    cases:
      # `MI` is the pronoun "we" (мы), not the numeral 1001.
      - text: "MI smo"
        want: "МИ смо"
      # `LI` is the interrogative particle (ли).
      - text: "DA LI voliš?"
        want: "ДА ЛИ волиш?"
      # `VI` is "you (pl.)" (ви).
      - text: "VI ste"
        want: "ВИ сте"
      # `CI` is the dative of "ти".
      - text: "CI je rekao"
        want: "ЦИ је рекао"
      # Common Serbian words made of Roman-numeral letters:
      - text: "CIVIL"
        want: "ЦИВИЛ"
      - text: "MILD dan"
        want: "МИЛД дан"
      # Genuine Roman numerals must still stay Latin.
      - text: "II vek"
        want: "II век"
      - text: "MCMLXXXIV"
        want: "MCMLXXXIV"

  - section: "Serbian Latin → Cyrillic — Đ variants (U+0110 / U+00D0)"
    lang: srp
    direction: to_cyr
    cases:
      - text: "Đuzepe"
        want: "Ђузепе"
      - text: "đuzepe"
        want: "ђузепе"
      - text: "Ðuzepe"
        want: "Ђузепе"
      - text: "ðuzepe"
        want: "ђузепе"

  - section: "Serbian Latin → Cyrillic — quoted text preserved"
    lang: srp
    direction: to_cyr
    cases:
      - text: 'grupe „Highway to Hell"'
        want: 'групе „Highway to Hell"'
      - text: 'izložba "Any-medium-whatever"'
        want: 'изложба "Any-medium-whatever"'
      - text: "pesma „Bella Ciao“"
        want: "песма „Bella Ciao“"
      - text: 'bend „AC/DC"'
        want: 'бенд „AC/DC"'

  - section: "Serbian Latin → Cyrillic — NFD input normalises to NFC first (B1)"
    lang: srp
    direction: to_cyr
    cases:
      # macOS clipboard, iOS filenames and many web sources hand out NFD.
      # `č`/`ć`/`š`/`ž`/`đ` decompose to base ASCII + combining mark.
      # NFD `čovek` = c + U+030C + o + v + e + k
      - text: "c\u030Covek"
        want: "човек"
      # NFD `Ćao` = C + U+0301 + a + o
      - text: "C\u0301ao"
        want: "Ћао"
      # NFD `žena` = z + U+030C + e + n + a
      - text: "z\u030Cena"
        want: "жена"
      # NFD `šta` = s + U+030C + t + a
      - text: "s\u030Cta"
        want: "шта"
      # NB: Đ/đ do NOT canonically decompose in Unicode — pinned to confirm
      # precomposed still round-trips alongside the NFD path.
      - text: "đak"
        want: "ђак"

  - section: "Serbian Latin → Cyrillic — quote-region edge cases (regression)"
    lang: srp
    direction: to_cyr
    cases:
      # Flipped French quotes must NOT be treated as a paired region — the
      # symmetric-character-class version of QUOTED_RE would eat this.
      - text: "»reci« ok"
        want: "»реци« ок"
      # Adjacent ASCII quotes with Serbian-low opener in between must not
      # collapse into one mis-paired span; each pair is independent.
      - text: 'reci "a" i „b"'
        want: 'реци "a" и „b"'
      # Two independent ASCII pairs on one line.
      - text: 'kaži "one" i "two" reci'
        want: 'кажи "one" и "two" реци'
      # Unclosed quote → nothing protected, plain conversion of the rest.
      - text: 'nema kraja "otvoreno reci'
        want: 'нема краја "отворено реци'

  - section: "Serbian Latin → Cyrillic — foreign words (w/x/y/q) skipped"
    lang: srp
    direction: to_cyr
    cases:
      - text: "New York"
        want: "New York"
      - text: "WiFi signal"
        want: "WiFi сигнал"

  - section: "Serbian Latin → Cyrillic — no Latin leak"
    lang: srp
    direction: to_cyr
    cases:
      - text: "Batumski arheološki muzej"
        want: "Батумски археолошки музеј"
      - text: "Sarčimelidze"
        want: "Сарчимелидзе"

