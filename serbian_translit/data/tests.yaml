# Test cases shared across every port (Python / Swift / Kotlin).
# Each section pins a source→target direction; the same YAML drives the
# pytest parametrize in every language.

tests:

  - section: "Serbian Latin → Cyrillic — mixed-case digraphs (irregular)"
    source: srp-latn
    target: srp-cyrl
    cases:
      - text: "lJ"
        want: "љ"
      - text: "nJ"
        want: "њ"
      - text: "dŽ"
        want: "џ"

  - section: "Serbian Latin → Cyrillic — common words"
    source: srp-latn
    target: srp-cyrl
    cases:
      - text: "Srbija"
        want: "Србија"
      - text: "SRBIJA"
        want: "СРБИЈА"
      - text: "Beograd"
        want: "Београд"
      - text: "BEOGRAD"
        want: "БЕОГРАД"
      - text: "Novi Sad"
        want: "Нови Сад"
      - text: "NOVI SAD"
        want: "НОВИ САД"

  - section: "Serbian Latin → Cyrillic — digraph words"
    source: srp-latn
    target: srp-cyrl
    cases:
      - text: "ljubav"
        want: "љубав"
      - text: "Ljubav"
        want: "Љубав"
      - text: "LJUBAV"
        want: "ЉУБАВ"
      - text: "konj"
        want: "коњ"
      - text: "Konj"
        want: "Коњ"
      - text: "KONJ"
        want: "КОЊ"
      - text: "džep"
        want: "џеп"
      - text: "Džep"
        want: "Џеп"
      - text: "DŽEP"
        want: "ЏЕП"

  - section: "Serbian Latin → Cyrillic — diacritics"
    source: srp-latn
    target: srp-cyrl
    cases:
      - text: "čovek"
        want: "човек"
      - text: "Čovek"
        want: "Човек"
      - text: "ČOVEK"
        want: "ЧОВЕК"
      - text: "ćao"
        want: "ћао"
      - text: "Ćao"
        want: "Ћао"
      - text: "ĆAO"
        want: "ЋАО"
      - text: "đak"
        want: "ђак"
      - text: "Đak"
        want: "Ђак"
      - text: "ĐAK"
        want: "ЂАК"
      - text: "što"
        want: "што"
      - text: "Što"
        want: "Што"
      - text: "ŠTO"
        want: "ШТО"
      - text: "žena"
        want: "жена"
      - text: "Žena"
        want: "Жена"
      - text: "ŽENA"
        want: "ЖЕНА"

  - section: "Serbian Latin → Cyrillic — sentences"
    source: srp-latn
    target: srp-cyrl
    cases:
      - text: "Dobar dan"
        want: "Добар дан"
      - text: "DOBAR DAN"
        want: "ДОБАР ДАН"
      - text: "Kako si?"
        want: "Како си?"
      - text: "Hvala lepo"
        want: "Хвала лепо"
      - text: "Vidimo se kasnije"
        want: "Видимо се касније"

  - section: "Serbian Latin → Cyrillic — consecutive digraphs"
    source: srp-latn
    target: srp-cyrl
    cases:
      - text: "Njujork"
        want: "Њујорк"
      - text: "NJUJORK"
        want: "ЊУЈОРК"

  - section: "Serbian Latin → Cyrillic — numbers and punctuation"
    source: srp-latn
    target: srp-cyrl
    cases:
      - text: "Beograd 2024"
        want: "Београд 2024"
      - text: "Zdravo, kako si?"
        want: "Здраво, како си?"

  - section: "Serbian Latin → Cyrillic — mixed Serbian and non-Serbian"
    source: srp-latn
    target: srp-cyrl
    cases:
      - text: "Srbija i Serbia"
        want: "Србија и Сербиа"
      - text: "café u Beogradu"
        want: "цафé у Београду"

  - section: "Serbian Latin → Cyrillic — Roman numerals stay Latin"
    source: srp-latn
    target: srp-cyrl
    cases:
      - text: "Nikolaj II"
        want: "Николај II"
      - text: "Aleksandar III"
        want: "Александар III"
      - text: "Luj XIV"
        want: "Луј XIV"
      - text: "XX vek"
        want: "XX век"

  - section: "Serbian Latin → Cyrillic — Đ variants (U+0110 / U+00D0)"
    source: srp-latn
    target: srp-cyrl
    cases:
      - text: "Đuzepe"
        want: "Ђузепе"
      - text: "đuzepe"
        want: "ђузепе"
      - text: "Ðuzepe"
        want: "Ђузепе"
      - text: "ðuzepe"
        want: "ђузепе"

  - section: "Serbian Latin → Cyrillic — quoted text preserved"
    source: srp-latn
    target: srp-cyrl
    cases:
      - text: 'grupe „Highway to Hell"'
        want: 'групе „Highway to Hell"'
      - text: 'izložba "Any-medium-whatever"'
        want: 'изложба "Any-medium-whatever"'
      - text: "pesma „Bella Ciao“"
        want: "песма „Bella Ciao“"
      - text: 'bend „AC/DC"'
        want: 'бенд „AC/DC"'

  - section: "Serbian Latin → Cyrillic — quote-region edge cases (regression)"
    source: srp-latn
    target: srp-cyrl
    cases:
      # Flipped French quotes must NOT be treated as a paired region — the
      # symmetric-character-class version of QUOTED_RE would eat this.
      - text: "»reci« ok"
        want: "»реци« ок"
      # Adjacent ASCII quotes with Serbian-low opener in between must not
      # collapse into one mis-paired span; each pair is independent.
      - text: 'reci "a" i „b"'
        want: 'реци "a" и „b"'
      # Two independent ASCII pairs on one line.
      - text: 'kaži "one" i "two" reci'
        want: 'кажи "one" и "two" реци'
      # Unclosed quote → nothing protected, plain conversion of the rest.
      - text: 'nema kraja "otvoreno reci'
        want: 'нема краја "отворено реци'

  - section: "Serbian Latin → Cyrillic — foreign words (w/x/y/q) skipped"
    source: srp-latn
    target: srp-cyrl
    cases:
      - text: "New York"
        want: "New York"
      - text: "WiFi signal"
        want: "WiFi сигнал"

  - section: "Serbian Latin → Cyrillic — no Latin leak"
    source: srp-latn
    target: srp-cyrl
    cases:
      - text: "Batumski arheološki muzej"
        want: "Батумски археолошки музеј"
      - text: "Sarčimelidze"
        want: "Сарчимелидзе"

  - section: "Serbian Cyrillic → Latin — common words (reverse)"
