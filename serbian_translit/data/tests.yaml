      - text: "Човек"
        want: "Čovek"
      - text: "ЧОВЕК"
        want: "ČOVEK"
      - text: "ћао"
        want: "ćao"
      - text: "Ћао"
        want: "Ćao"
      - text: "ЋАО"
        want: "ĆAO"
      - text: "ђак"
        want: "đak"
      - text: "Ђак"
        want: "Đak"
      - text: "ЂАК"
        want: "ĐAK"
      - text: "што"
