name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Extract release notes for this tag from CHANGELOG.md
        id: notes
        run: |
          version="${GITHUB_REF_NAME#v}"
          # Everything between `## $version` and the next `## X.Y.Z` header.
          awk -v v="$version" '
            $0 ~ "^## "v"([[:space:]]|$)" {found=1; next}
            found && $0 ~ /^## [0-9]+\.[0-9]+\.[0-9]+/ {exit}
            found {print}
          ' CHANGELOG.md > /tmp/notes.md
          if ! [ -s /tmp/notes.md ]; then
            echo "No CHANGELOG entry for $version" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "${{ steps.notes.outputs.version }}" \
            --notes-file /tmp/notes.md
