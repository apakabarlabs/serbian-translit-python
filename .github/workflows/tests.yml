name: Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install ruff + mypy
        run: |
          python -m pip install --upgrade pip
          pip install -e . ruff mypy types-PyYAML
      - name: Ruff check
        run: ruff check serbian_translit
      - name: Ruff format check
        run: ruff format --check serbian_translit
      - name: mypy strict
        run: mypy serbian_translit

  test:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ['3.10', '3.11', '3.12', '3.13', '3.14']

    steps:
    - uses: actions/checkout@v6

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install package + test deps
      run: |
        python -m pip install --upgrade pip
        pip install -e . pytest pytest-cov

    - name: Run tests with coverage
      run: pytest --cov --cov-report=term-missing

  wheel-smoke:
    # Rebuilds the wheel and imports it from a clean environment, exactly
    # the way `pip install serbian-translit` will land on end-user machines.
    # Catches package_data / pyproject regressions the source tree misses.
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Build wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build --wheel
      - name: Install wheel in a clean venv
        run: |
          python -m venv /tmp/smoke
          /tmp/smoke/bin/pip install dist/*.whl
      - name: Import + smoke
        run: |
          /tmp/smoke/bin/python -c "
          import serbian_translit
          from serbian_translit import srp, cnr
          assert serbian_translit.__version__
          assert srp.to_cyr('Beograd') == 'Београд'
          assert srp.to_lat('Њујорк') == 'Njujork'
          assert cnr.to_cyr('śever') == 'с́евер'
          assert cnr.to_lat('с́евер') == 'śever'
          print('OK version=' + serbian_translit.__version__)
          "
